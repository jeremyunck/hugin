# Optional override that enables Bouw's per-session Docker sandboxes, including the fully isolated
# project-chat (GitHub repository) sandboxes that clone the repo inside a dedicated container.
#
#   # Build the agent sandbox image once so new project chats have an image to run:
#   docker build -t bouw-agent-sandbox:latest docker/sandbox
#
#   docker compose -f docker-compose.yml -f docker-compose.sandbox.yml up --build
#
# ⚠️  WARNING: this mounts the host Docker socket (/var/run/docker.sock) into the
# Bouw container. That gives the container — and therefore the agent running
# inside it — full control of the host's Docker daemon, which is effectively
# root-equivalent access to the host. Only enable this on a machine you trust and
# never expose such a deployment to untrusted users or the public internet.

services:
  bouw:
    environment:
      SANDBOX_ENABLED: "true"
      # Image for the generic agent.sandbox.* bind-mount sandboxes (POST /api/sandboxes).
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-ubuntu:24.04}
      # Image for the isolated project-chat sandboxes (bouw.sandbox.*); build it from
      # docker/sandbox/Dockerfile. Must be available to the host daemon.
      BOUW_SANDBOX_IMAGE: ${BOUW_SANDBOX_IMAGE:-bouw-agent-sandbox:latest}
    volumes:
      # ⚠️  Host Docker control — see warning above.
      - /var/run/docker.sock:/var/run/docker.sock
