name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

# Minimal default permissions — each job grants only what it needs.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build and test
        run: mvn --batch-mode --no-transfer-progress clean install

      # SpotBugs SAST runs on the already-compiled bytecode — no recompile needed.
      - name: Run SpotBugs SAST
        if: github.event_name == 'pull_request' && success()
        run: |
          mvn --batch-mode --no-transfer-progress \
            com.github.spotbugs:spotbugs-maven-plugin:4.8.6.4:check \
            -Dspotbugs.effort=Default \
            -Dspotbugs.threshold=High \
            -Dspotbugs.failOnError=true

      - name: Upload test reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7
          if-no-files-found: ignore

  # Scans Maven dependencies for known critical CVEs using Trivy.
  dependency-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Scan for critical CVEs
        run: |
          trivy fs . \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type library \
            --severity CRITICAL \
            --quiet

  # Secret detection across all commits in the PR using the gitleaks CLI.
  secret-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          GITLEAKS_VERSION="8.21.2"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -O /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . \
            --log-opts="${BASE_SHA}..${HEAD_SHA}" \
            --redact --exit-code 1
