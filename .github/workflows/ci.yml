name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Minimal default permissions — each job grants only what it needs.
permissions:
  contents: read

jobs:
  # Frontend gate: typecheck, lint, unit tests, and a production build. Runs independently of the
  # Maven build (which also builds the frontend) so a frontend-only break is reported clearly and
  # fast without waiting on the JVM toolchain.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  # Validates that the Compose stack (base + sandbox override) parses and resolves. Uses dummy
  # values for required secrets so the config check never depends on external LLM API keys.
  docker-compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate base compose config
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate compose config with sandbox override
        run: docker compose -f docker-compose.yml -f docker-compose.sandbox.yml config --quiet

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build and test
        # -T 1C builds independent reactor modules in parallel (one thread per core).
        # JaCoCo is opt-in via the "coverage" profile, so it stays off this hot path.
        run: mvn --batch-mode --no-transfer-progress -T 1C clean install

      # SpotBugs SAST runs on the already-compiled bytecode — no recompile needed.
      - name: Run SpotBugs SAST
        if: github.event_name == 'pull_request' && success()
        run: |
          mvn --batch-mode --no-transfer-progress \
            com.github.spotbugs:spotbugs-maven-plugin:4.8.6.4:check \
            -Dspotbugs.effort=Default \
            -Dspotbugs.threshold=High \
            -Dspotbugs.failOnError=true

      - name: Upload test reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7
          if-no-files-found: ignore

  # Scans Maven dependencies for known critical CVEs using Trivy.
  dependency-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Build and install every module so the local Maven repository (~/.m2) is fully
      # warmed: the parent POM (com.example:mcp-parent, needed for the tomcat.version
      # override) plus all external dependencies and their transitive POMs. Trivy's
      # pom.xml analyzer resolves from ~/.m2 first and only calls remote repositories for
      # artifacts it can't find locally; those remote calls can fail with
      # "semaphore acquire: context canceled" and abort the entire scan — a risk that grew
      # once the Google API client libraries (large transitive trees) were added. Warming
      # the cache keeps the scan local and deterministic.
      - name: Warm Maven repository for Trivy
        run: mvn --batch-mode --no-transfer-progress install -DskipTests -q

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Scan for critical CVEs
        run: |
          trivy fs . \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type library \
            --severity CRITICAL \
            --quiet

  # Secret detection across all commits in the PR using the gitleaks CLI.
  secret-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          GITLEAKS_VERSION="8.21.2"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -O /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . \
            --log-opts="${BASE_SHA}..${HEAD_SHA}" \
            --redact --exit-code 1
