name: Coverage Report

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and collect coverage
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Parse coverage and post comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, glob, xml.etree.ElementTree as ET, urllib.request, json

          def pct(covered, missed):
              total = covered + missed
              return (covered / total * 100) if total > 0 else 0.0

          def bar(p):
              filled = round(p / 10)
              return "█" * filled + "░" * (10 - filled)

          def emoji(p):
              if p >= 80: return "✅"
              if p >= 50: return "⚠️"
              return "❌"

          reports = sorted(glob.glob("**/target/site/jacoco/jacoco.xml", recursive=True))

          totals = {"INSTRUCTION": [0, 0], "BRANCH": [0, 0], "LINE": [0, 0], "METHOD": [0, 0]}
          rows = []

          for path in reports:
              module = path.split("/")[0]
              tree = ET.parse(path)
              root = tree.getroot()
              counters = {c.get("type"): c for c in root.findall("counter")}
              def val(t):
                  c = counters.get(t)
                  if c is None: return 0, 0
                  return int(c.get("covered", 0)), int(c.get("missed", 0))
              ic, im = val("INSTRUCTION")
              bc, bm = val("BRANCH")
              lc, lm = val("LINE")
              mc, mm = val("METHOD")
              ip = pct(ic, im)
              lp = pct(lc, lm)
              bp = pct(bc, bm)
              for k, v in zip(["INSTRUCTION","BRANCH","LINE","METHOD"], [[ic,im],[bc,bm],[lc,lm],[mc,mm]]):
                  totals[k][0] += v[0]; totals[k][1] += v[1]
              rows.append((module, ip, lp, bp, ic+im, ic, lc+lm, lc))

          ip_tot = pct(totals["INSTRUCTION"][0], totals["INSTRUCTION"][1])
          lp_tot = pct(totals["LINE"][0], totals["LINE"][1])
          bp_tot = pct(totals["BRANCH"][0], totals["BRANCH"][1])

          MARKER = "<!-- mcp-coverage-report -->"

          lines = [
              MARKER,
              "## 📊 Test Coverage Report",
              "",
              f"| Module | Instruction | Line | Branch | Lines (hit/total) |",
              f"|--------|------------|------|--------|-------------------|",
          ]
          for module, ip, lp, bp, lt, lc, ll, lhit in rows:
              lines.append(
                  f"| `{module}` | {emoji(ip)} {ip:.1f}% `{bar(ip)}` "
                  f"| {emoji(lp)} {lp:.1f}% | {emoji(bp)} {bp:.1f}% "
                  f"| {lhit}/{ll} |"
              )
          lines += [
              f"| **Total** | {emoji(ip_tot)} **{ip_tot:.1f}%** `{bar(ip_tot)}` "
              f"| {emoji(lp_tot)} **{lp_tot:.1f}%** | {emoji(bp_tot)} **{bp_tot:.1f}%** | — |",
              "",
              "> Legend: ✅ ≥80% · ⚠️ 50–79% · ❌ <50%",
          ]

          body = "\n".join(lines)

          pr = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/issues/{pr}/comments"

          # Delete previous coverage comment if one exists (matched by hidden marker only)
          req = urllib.request.Request(url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          })
          existing = json.loads(urllib.request.urlopen(req).read())
          for c in existing:
              if MARKER in c.get("body", ""):
                  del_url = f"https://api.github.com/repos/{repo}/issues/comments/{c['id']}"
                  urllib.request.urlopen(urllib.request.Request(del_url, method="DELETE", headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  }))

          data = json.dumps({"body": body}).encode()
          post = urllib.request.Request(url, data=data, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          })
          urllib.request.urlopen(post)
          print("Coverage comment posted.")
          PYEOF

      - name: Cleanup build artifacts
        if: always()
        continue-on-error: true
        run: mvn --batch-mode --no-transfer-progress clean
