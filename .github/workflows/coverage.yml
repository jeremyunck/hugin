name: Coverage Report

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and collect coverage
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Post coverage report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          import glob, os, json
          import urllib.request

          workspace = os.environ['WORKSPACE']
          pr_number = os.environ['PR_NUMBER']
          repo = os.environ['REPO']
          token = os.environ['GH_TOKEN']

          xml_files = sorted(glob.glob(f"{workspace}/**/target/site/jacoco/jacoco.xml", recursive=True))

          module_rows = []
          overall_missed = 0
          overall_covered = 0

          for xml_file in xml_files:
              module = xml_file.replace(workspace + '/', '').split('/')[0]
              tree = ET.parse(xml_file)
              root = tree.getroot()
              counters = {}
              for c in root.findall('counter'):
                  t = c.get('type')
                  counters[t] = (int(c.get('missed', 0)), int(c.get('covered', 0)))

              def pct(t):
                  if t not in counters:
                      return 'N/A'
                  m, cv = counters[t]
                  total = m + cv
                  if total == 0:
                      return 'N/A'
                  p = cv / total * 100
                  icon = '✅' if p >= 80 else ('⚠️' if p >= 60 else '❌')
                  return f'{icon} {p:.0f}%'

              instr = counters.get('INSTRUCTION', (0, 0))
              overall_missed += instr[0]
              overall_covered += instr[1]
              module_rows.append(f'| `{module}` | {pct("INSTRUCTION")} | {pct("LINE")} | {pct("BRANCH")} |')

          total = overall_missed + overall_covered
          if total > 0:
              op = overall_covered / total * 100
              overall_pct = f'{op:.0f}%'
              overall_icon = '✅' if op >= 80 else ('⚠️' if op >= 60 else '❌')
              overall_str = f'{overall_icon} {overall_pct}'
              header = f'## 📊 Test Coverage Report — {overall_icon} {overall_pct}'
          else:
              overall_str = 'N/A'
              header = '## 📊 Test Coverage Report'

          FENCE = chr(96) * 3
          dragon_inner = r"""               ___====-_  _-====___
         _--^^^#####//      \\#####^^^--_
      _-^##########// (    ) \\##########^-_
     -############//  |\^^/|  \\############-
   _/############//   (@::@)   \\############\_
  /#############((     \\//     ))#############\
 -###############\\    (oo)    //###############-
-#################\\  / VV \  //#################-
-###################\\/      \//###################-
____###################\    /###################____
  ~~####################\/####################~~
     ~~##############  |  ~~##############~~
         ~~########    |    ########~~
             ~~~~       |       ~~~~"""
          dragon = f'\n{FENCE}\n{dragon_inner}\n{FENCE}\n'

          marker = '<!-- coverage-report -->'
          body = '\n'.join([
              marker,
              header,
              '',
              dragon,
              '## 📦 Coverage by Module',
              '',
              '| Module | Instructions | Lines | Branches |',
              '|--------|-------------|-------|----------|',
              *module_rows,
              f'| **Overall** | **{overall_str}** | | |',
              '',
              '_✅ ≥ 80% · ⚠️ 60–79% · ❌ < 60%_',
          ])

          headers = {
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'Accept': 'application/vnd.github.v3+json',
              'User-Agent': 'coverage-bot',
          }

          list_url = f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments'
          req = urllib.request.Request(list_url, headers=headers)
          with urllib.request.urlopen(req) as resp:
              comments = json.loads(resp.read())

          existing = next(
              (c for c in comments if marker in c.get('body', '') or '<!-- module-coverage-breakdown -->' in c.get('body', '')),
              None
          )

          payload = json.dumps({'body': body}).encode()
          if existing:
              update_url = f"https://api.github.com/repos/{repo}/issues/comments/{existing['id']}"
              req = urllib.request.Request(update_url, data=payload, headers=headers, method='PATCH')
          else:
              req = urllib.request.Request(list_url, data=payload, headers=headers, method='POST')

          with urllib.request.urlopen(req) as resp:
              pass

          print(f"Coverage comment posted/updated for PR #{pr_number}")
          print(body)
          PYEOF
