server:
  port: 8080

spring:
  application:
    name: hugin
  datasource:
    # Defaults target a local PostgreSQL for native development. Inside Docker, compose sets
    # SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hugin to reach the postgres service.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hugin}
    username: ${SPRING_DATASOURCE_USERNAME:hugin}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  sql:
    init:
      mode: always
  data:
    # Redis backing the long-term memory store. Only contacted when memory.enabled=true
    # (the connection is established lazily on first use).
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

llm:
  # Active LLM provider — must match a key under llm.providers below. Override with LLM_PROVIDER.
  provider: ${LLM_PROVIDER:openrouter}
  # Default model used when a request does not specify one. Override with LLM_MODEL.
  # Must be a model that supports tool calling and be valid for the active provider
  # (e.g. llama3.2 / mistral-nemo for Ollama, openai/gpt-oss-120b for OpenRouter).
  model: ${LLM_MODEL:openai/gpt-oss-120b}
  # Reasoning effort sent to providers that support it. DeepSeek V4 maps medium to high.
  reasoning-effort: ${LLM_REASONING_EFFORT:medium}
  providers:
    # Local Ollama exposing the OpenAI-compatible API — no API key, so no auth header is sent.
    ollama:
      base-url: http://localhost:11434/v1
    # OpenRouter — authenticates with an Authorization: Bearer <api-key> header.
    # Set OPEN_ROUTER_API_KEY in the environment (sk-or-v1-...) and switch provider to "openrouter".
    openrouter:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPEN_ROUTER_API_KEY:}
    # OpenAI — authenticates with an Authorization: Bearer <api-key> header.
    # Set OPENAI_API_KEY in the environment (sk-...) and switch provider to "openai"
    # (LLM_PROVIDER=openai). Remember to also set a valid OpenAI model, e.g. LLM_MODEL=gpt-4o-mini.
    openai:
      base-url: https://api.openai.com/v1
      api-key: ${OPENAI_API_KEY:}

conversation:
  memory:
    # Short-term, per-session conversation memory: the recent turns of a chat session are replayed
    # back into the model on each request so it remembers what was just said. Requests opt in by
    # sending a "sessionId"; requests without one stay stateless. Kept in-process by default (no
    # external dependency) and distinct from the long-term semantic memory below.
    enabled: ${CONVERSATION_MEMORY_ENABLED:true}
    # Sliding-window size: the most recent N stored messages kept per session.
    max-messages: 20
    # Optional idle-retention limit. Leave blank to retain chat context until it is trimmed by
    # max-messages instead of expiring after a fixed timeout.
    ttl:
    # JSON file that mirrors short-term conversation memory so chats survive service restarts.
    store-file: ${CONVERSATION_MEMORY_STORE_FILE:${agent.home}/state/conversation-memory.json}

memory:
  # Redis-backed long-term memory with text-embedding recall. Disabled by default; when enabled it
  # requires a reachable Redis (spring.data.redis.*) and an embedding endpoint (embedding.* below).
  # When enabled, each finished exchange is embedded and stored, and the most-similar past memories
  # are injected into the prompt of future requests.
  enabled: ${MEMORY_ENABLED:false}
  # Redis key prefix under which memory records are stored (hash key is "<prefix>:records").
  key-prefix: agent:memory
  # Number of most-similar past memories recalled into the prompt.
  top-k: 3
  # Minimum cosine similarity (0..1) a memory must reach to be recalled; 0 disables the threshold.
  min-score: 0.75
  # Hard cap on stored memories; the oldest are evicted past this.
  max-entries: 1000

bug-reports:
  redis:
    # Short-lived catalog of recently reported bugs that can be injected into fresh repo sandboxes.
    ttl: ${BUG_REPORTS_REDIS_TTL:1d}
    key-prefix: ${BUG_REPORTS_REDIS_KEY_PREFIX:bug-reports}

image:
  # The describe_image tool: the default chat model is text-only, so when a user attaches an image
  # the agent calls this tool, which forwards the attachment to a vision-capable model over the
  # OpenRouter chat-completions endpoint (authenticated with OPEN_ROUTER_API_KEY) and returns a
  # textual description. The tool is only advertised when OPEN_ROUTER_API_KEY is set.
  describe:
    endpoint: ${IMAGE_DESCRIBE_ENDPOINT:https://openrouter.ai/api/v1/chat/completions}
    # Vision-capable model used to describe attached images (independent of the chat llm.model).
    model: ${IMAGE_DESCRIBE_MODEL:openai/gpt-4o-mini}
    # Cap on the length of the description returned by the vision model.
    max-tokens: ${IMAGE_DESCRIBE_MAX_TOKENS:1024}

embedding:
  # OpenAI-schema embeddings endpoint (POST <base-url>/embeddings) used to vectorise memory text.
  # Defaults to OpenRouter; authenticates with Authorization: Bearer <api-key> when a key is set.
  base-url: ${EMBEDDING_BASE_URL:https://openrouter.ai/api/v1}
  api-key: ${OPEN_ROUTER_API_KEY:}
  # Model used specifically for embedding text (independent of the chat llm.model above).
  model: ${EMBEDDING_MODEL:openai/text-embedding-3-small}

agent:
  # API key for the /api/agent/** endpoints. Leave blank to disable authentication
  # (e.g. running behind a network-level security boundary).
  api-key:
  # Maximum wall-clock time allowed for a single agent request
  request-timeout: 5m
  # Maximum number of tool-call iterations in the agent loop before giving up.
  # A higher value gives the model more chances to use tools and refine its answer,
  # but also increases the maximum latency of a single request.
  max-iterations: 50
  # Base-of-operations directory for the agent server (install.sh sets this to ~/.hugin).
  # Used by SystemFactsService for disk-space reporting and by CloudAgentService for agent directories.
  home: ${AGENT_HOME:${user.home}/.hugin}
  # Cloud-agent feature: each POST /api/agents clones a repository and runs the agent loop against it.
  cloud:
    # Enable the /api/agents endpoints and repo-cloning feature.
    enabled: ${CLOUD_AGENTS_ENABLED:false}
    # Cap on concurrent cloud-agent tasks.
    max-concurrent: 3
    # GitHub personal-access token used for git clone/push; keep blank to use only public repos.
    github-token: ${GITHUB_TOKEN:}
    # Prefix for the branch created in each cloned repository: <prefix>/<slug>-<short-id>.
    branch-prefix: agent
    # Delete the cloned working tree automatically when the agent loop finishes.
    cleanup-on-complete: false
  # Built-in local tools the agent can call directly (file read/write/edit, list, grep, shell).
  # These run in-process and let the model edit code and run commands. They grant the agent
  # filesystem and shell access, so disable them or scope workspace-root when that is a concern.
  tools:
    # Master switch for all built-in tools.
    enabled: true
    # Directory that file operations are confined to and the working dir for shell commands.
    # Relative paths and '~/' are NOT expanded here; use an absolute path to pin the workspace.
    # In Docker this is set to /workspace (a named volume) via AGENT_WORKSPACE_ROOT.
    workspace-root: ${AGENT_WORKSPACE_ROOT:.}
    # Wall-clock limit for a single run_bash command.
    bash-timeout: 30s
    # Shell binary run_bash invokes. Blank auto-detects the user's login shell from $SHELL
    # (falling back to /bin/sh). Set explicitly to pin one, e.g. /bin/bash or /bin/zsh.
    shell: ""
    # Run commands through a login shell (-l) so the user's profile is sourced. Keep this true
    # so PATH entries set up in ~/.zprofile / ~/.bash_profile resolve — this is what makes
    # Homebrew tools like 'brew' (/opt/homebrew/bin, /usr/local/bin) runnable from run_bash.
    # Trade-off: the profile may define aliases/functions or run side-effecting startup code;
    # set to false to run a plain non-login shell if that is a concern.
    login-shell: true
    # Cap on the size (characters) of any single tool result returned to the model.
    max-output-chars: 30000
    # Glob patterns (relative to workspace-root) that read_file, write_file, and edit_file
    # will refuse to access. Patterns follow Java glob syntax; ** matches across directories.
    # Examples:  **/.env  secrets/**  **/*.key  .git/**
    deny-list: []
    # Workspace-local just-in-time tool manifests. The agent rescans this directory on every
    # loop iteration, so tools created at runtime become available without restarting Hugin.
    # The create_agent_tool tool writes generated scripts + manifests here (and a .gitignore so
    # they are never committed). Keep this path covered by .gitignore.
    jit-tool-directory: .hugin/jit-tools
    # Cap on the number of generated (just-in-time) tools per workspace. A guardrail against the
    # agent minting a sprawl of one-off tools; create_agent_tool refuses once the limit is hit.
    max-jit-tools: 24
  # Per-session Docker sandboxes. POST /api/sandboxes starts a container whose bind-mounted working
  # directory becomes the agent's confined workspace; chat/stream requests target it via "sandboxId"
  # and run_bash is executed inside that container (docker exec). File tools operate on the host-side
  # bind-mount, so file edits and shell commands share one workspace path.
  #
  # GitHub project chats (POST /api/sandboxes/github) are now fully isolated: the selected repository
  # is cloned INSIDE a dedicated Docker container (never on the host) and all of the agent's file and
  # shell tools execute in that container. Those project sandboxes are configured under hugin.sandbox.*
  # (see below) and persisted in the sandbox_sessions table, not by the settings in this block — the
  # agent.sandbox.* settings here apply only to the generic POST /api/sandboxes bind-mount sandboxes.
  sandbox:
    # Master switch for the /api/sandboxes endpoints and sandbox-routed shell execution.
    enabled: ${SANDBOX_ENABLED:true}
    # Default container image used when a create request omits one. Must already be available to the
    # Docker daemon (pulled or built locally); override per-request with the "image" field.
    image: ${SANDBOX_IMAGE:ubuntu:24.04}
    # Docker CLI binary used to manage containers.
    docker-bin: ${SANDBOX_DOCKER_BIN:docker}
    # Wall-clock limit for a single command run inside a sandbox.
    exec-timeout: 120s
    # Wall-clock limit for starting a sandbox container.
    start-timeout: 120s
    # Docker network for sandbox containers. Blank uses the default bridge; set to "none" to isolate.
    network: ${SANDBOX_NETWORK:}
    # Prefix for sandbox container names: <prefix><sandbox-id>.
    container-prefix: hugin-sbx-
    # Cap on the number of concurrently running sandboxes.
    max-sandboxes: 25

# Fully isolated, containerized project-chat sandboxes (hugin.sandbox.*). Unlike the legacy
# agent.sandbox.* bind-mount sandboxes above, a project (GitHub repository) chat here gets its own
# Docker container plus a named volume that holds the repository checkout. The repository is cloned
# INSIDE the container at /workspace/repo and never written to the host, so every file and shell tool
# executes inside the container. There is no host-execution fallback for project chats: if Docker is
# unavailable, sandbox creation fails loudly.
hugin:
  sandbox:
    # Master switch for the isolated project-chat sandbox runtime.
    enabled: ${SANDBOX_ENABLED:true}
    # Image new sandbox containers run. Build it from docker/sandbox/Dockerfile:
    #   docker build -t hugin-agent-sandbox:latest docker/sandbox
    image: ${HUGIN_SANDBOX_IMAGE:hugin-agent-sandbox:latest}
    # Hours a sandbox may sit unused before the hourly cleanup job destroys it.
    idle-timeout-hours: ${HUGIN_SANDBOX_IDLE_TIMEOUT_HOURS:72}
    # Docker CLI binary used to manage containers and volumes.
    docker-bin: ${HUGIN_SANDBOX_DOCKER_BIN:docker}
    # Per-container resource limits.
    memory: ${HUGIN_SANDBOX_MEMORY:4g}
    cpus: ${HUGIN_SANDBOX_CPUS:2}
    pids-limit: ${HUGIN_SANDBOX_PIDS_LIMIT:512}
    # Docker network for sandbox containers. Blank uses the default bridge; set to "none" to isolate.
    network: ${HUGIN_SANDBOX_NETWORK:}
    # Prefix for container/volume names: <prefix><id> and <prefix><id>-workspace.
    container-prefix: hugin-agent-
    # Workspace mount point and repository checkout subdirectory inside the container.
    workspace-path: /workspace
    repo-subdir: repo
    # Wall-clock limits for in-container command execution, container start, and the initial clone.
    exec-timeout: 120s
    start-timeout: 120s
    clone-timeout: 300s

auth:
  bootstrap:
    # Primary local login created on startup. Password intentionally has no default so the app does
    # not silently boot with a generic admin credential.
    username: ${AUTH_BOOTSTRAP_USERNAME:test}
    password: ${AUTH_BOOTSTRAP_PASSWORD:}
    # Local-development escape hatch. When false (the default, and the expectation for any shared or
    # production deployment) the app refuses to start if AUTH_BOOTSTRAP_PASSWORD is blank or a
    # well-known weak/default value (e.g. change-me, admin, password). Set to true ONLY for local
    # development to allow a weak password; a loud warning is logged in that case. The Docker
    # quickstart (docker-compose.yml) sets this to true so the localhost demo boots.
    allow-insecure-password: ${AUTH_BOOTSTRAP_ALLOW_INSECURE_PASSWORD:false}
  test-user:
    # Seeded account used by agents for authenticated UI verification and screenshots.
    # The password intentionally has no default: the account is only created when
    # AUTH_TEST_USER_PASSWORD is set, so the public build never ships a known credential.
    username: ${AUTH_TEST_USER_USERNAME:screenshot-test}
    password: ${AUTH_TEST_USER_PASSWORD:}
  jwt:
    # Optional base64-encoded HMAC key used to sign JWTs.
    # If blank, Hugin generates an ephemeral key on startup.
    secret-base64: ${AUTH_JWT_SECRET_BASE64:}
    issuer: hugin
    token-ttl: 12h
  # Self-scheduling: the schedule_prompt / list_scheduled_prompts / cancel_scheduled_prompt tools
  # let the agent set a prompt to run later (one-shot or recurring cron). When it fires, the prompt
  # runs through the full agent and the result is delivered back to the origin (the session it was
  # scheduled from) over the /api/agent/deliveries SSE stream — e.g. the Discord bot posts it to the
  # originating channel/DM.
  scheduler:
    # Master switch for the scheduling tools and the runner. When false the tools are not registered.
    enabled: ${SCHEDULER_ENABLED:true}
    # JSON file scheduled prompts are persisted to so they survive a restart ('~/' is expanded).
    store-file: ${SCHEDULER_STORE_FILE:~/.hugin/scheduled-prompts.json}
    # Cap on how many active schedules a single origin (session) may hold.
    max-per-target: 20
    # IANA timezone used when a schedule request omits one (e.g. America/Chicago for US Central).
    default-zone: ${SCHEDULER_DEFAULT_ZONE:}

google:
  # Google Workspace integration powering the google_drive_*, google_docs_*,
  # google_sheets_*, google_calendar_* and google_gmail_* tools.
  #
  # Preferred setup for a personal install:
  #   1. In a Google Cloud project, enable the Google Docs, Sheets, Drive, Calendar and Gmail APIs.
  #   2. Create an OAuth client for a desktop app and download its JSON.
  #   3. Point oauth-client-secrets-file at that JSON (or set GOOGLE_OAUTH_CLIENT_SECRETS_FILE).
  #   4. On first use, Hugin opens the browser for consent and caches refresh tokens in oauth-token-dir.
  #
  # Legacy Workspace setup:
  #   1. Create a service account and download its JSON key.
  #   2. Point credentials-file at that JSON (or set GOOGLE_APPLICATION_CREDENTIALS).
  #   3. Share the docs/sheets/calendar/email data you want Hugin to access with the service account's email.
  # Gmail write support requires gmail.send scope in addition to gmail.readonly.
  # When no credentials are configured the google_* tools report themselves unavailable (no startup failure).
  oauth-client-secrets-file: ${GOOGLE_OAUTH_CLIENT_SECRETS_FILE:}
  oauth-token-dir: ${GOOGLE_OAUTH_TOKEN_DIR:~/.hugin/google-oauth}
  oauth-local-server-port: ${GOOGLE_OAUTH_LOCAL_SERVER_PORT:8765}
  # Public callback URL registered in the Google Cloud Console OAuth client. Set this to the
  # deployed server's callback endpoint (e.g. https://hugin.thecognitivejunction.com/Callback).
  # When blank a local loopback receiver is used (suitable for local dev only).
  oauth-callback-url: ${GOOGLE_OAUTH_CALLBACK_URL:https://hugin.thecognitivejunction.com/Callback}
  credentials-file: ${GOOGLE_APPLICATION_CREDENTIALS:}
  # Application name reported to the Google APIs (cosmetic).
  application-name: Hugin
  # Optional: for Google Workspace domains with domain-wide delegation, the user email to impersonate.
  impersonate-user: ${GOOGLE_IMPERSONATE_USER:}
  # Optional: email that newly created docs/sheets are automatically shared with (as editor),
  # so a person can open files the service account creates. Per-call share_with overrides this.
  default-share-with: ${GOOGLE_DEFAULT_SHARE_WITH:}

github:
  # GitHub integration powering the github_* tools, authenticated as a GitHub App.
  #
  # Setup:
  #   1. Create a GitHub App (Settings → Developer settings → GitHub Apps → New). Give it the
  #      repository permissions you want Hugin to have (e.g. Contents: read, Issues: read & write).
  #   2. Note the numeric App ID and the App's slug (the name in its public URL,
  #      https://github.com/apps/<slug>), then generate and download a private key (.pem).
  #   3. Point private-key-path at that .pem (or paste the PEM into private-key) and set app-id/app-slug.
  #   4. Click "Connect" in the Integrations screen to open the App's install page, then install it on
  #      the account/organization and repositories you want Hugin to access.
  # When no credentials are configured the github_* tools report themselves unavailable (no startup failure).
  app-id: ${GITHUB_APP_ID:}
  app-slug: ${GITHUB_APP_SLUG:}
  # Provide the App private key either inline (PEM) or as a file path. private-key wins when both are set.
  private-key: ${GITHUB_APP_PRIVATE_KEY:}
  private-key-path: ${GITHUB_APP_PRIVATE_KEY_PATH:}
  # Optional: pin a specific installation id. When blank, the App's first installation is used.
  installation-id: ${GITHUB_APP_INSTALLATION_ID:}
  # API/web roots — override for GitHub Enterprise Server.
  api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
  web-base-url: ${GITHUB_WEB_BASE_URL:https://github.com}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: never

newrelic:
  enabled: ${NEW_RELIC_ENABLED:false}
  license-key: ${NEW_RELIC_TOKEN:}
  service-name: hugin

logging:
  level:
    com.example: DEBUG
