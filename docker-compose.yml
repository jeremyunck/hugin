# Bouw — Docker quickstart stack: the app plus its PostgreSQL and Redis backends.
#
#   cp .env.example .env   # then add your LLM key and set HOST_PORT if 8080 is already taken
#   docker compose up --build
#
# App is served on http://localhost:${HOST_PORT:-8080}. Stop with `docker compose down`;
# reset all local data (DB, Redis, agent home, workspace) with `docker compose down -v`.
# If port 8080 is already in use on the host (e.g. by a native Bouw install), set
# HOST_PORT to a free port (e.g. HOST_PORT=8081) in .env before starting.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SPRING_DATASOURCE_DB:-bouw}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-bouw}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-bouw}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-bouw} -d ${SPRING_DATASOURCE_DB:-bouw}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  bouw:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Reach the postgres service inside the compose network instead of localhost.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${SPRING_DATASOURCE_DB:-bouw}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-bouw}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-bouw}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # LLM provider / credentials.
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-oss-120b}
      OPEN_ROUTER_API_KEY: ${OPEN_ROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-medium}
      # Agent runtime.
      AGENT_HOME: ${AGENT_HOME:-/home/bouw/.bouw}
      AGENT_WORKSPACE_ROOT: /workspace
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-false}
      MEMORY_ENABLED: ${MEMORY_ENABLED:-false}
      # Bootstrap login. The default password is a well-known weak value, so the app would normally
      # refuse to start; this localhost quickstart opts in to the weak password (a loud warning is
      # logged). Set a strong AUTH_BOOTSTRAP_PASSWORD and AUTH_BOOTSTRAP_ALLOW_INSECURE_PASSWORD=false
      # before exposing Bouw beyond localhost.
      AUTH_BOOTSTRAP_USERNAME: ${AUTH_BOOTSTRAP_USERNAME:-admin}
      AUTH_BOOTSTRAP_PASSWORD: ${AUTH_BOOTSTRAP_PASSWORD:-change-me}
      AUTH_BOOTSTRAP_ALLOW_INSECURE_PASSWORD: ${AUTH_BOOTSTRAP_ALLOW_INSECURE_PASSWORD:-true}
    ports:
      - "${HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    volumes:
      - bouw_home:/home/bouw/.bouw
      - workspace:/workspace

volumes:
  pgdata:
  redisdata:
  bouw_home:
  workspace:
