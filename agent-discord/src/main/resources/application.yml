spring:
  application:
    name: agent-discord
  main:
    web-application-type: none   # console/service app, no HTTP server
    banner-mode: "off"
    log-startup-info: false

discord:
  # -----------------------------------------------------------------------
  # Required: Discord bot token from the Developer Portal (Applications → Bot).
  # Set the DISCORD_BOT_TOKEN environment variable, or override this value.
  #
  # IMPORTANT — enable "Message Content Intent" in the Developer Portal at
  # Applications → <your bot> → Bot → Privileged Gateway Intents, otherwise
  # the bot will receive events but the message text will be empty.
  # -----------------------------------------------------------------------
  bot-token: ${DISCORD_BOT_TOKEN}

  # Guild channel IDs (right-click a channel → Copy Channel ID) the bot
  # will monitor. Leave empty to handle DMs only.
  allowed-channel-ids: ["1510063052140056812"]
  #  - "1234567890123456789"

  # When true (the default), the bot only replies in guild channels when directly addressed —
  # either @mentioned or replied to. Set to false to have it respond to every message.
  # DM behaviour is unaffected.
  mention-only: true

  # When true (the default), the bot responds to direct messages.
  respond-to-dms: true

  # -----------------------------------------------------------------------
  # Agent server connection (same knobs as the main server)
  # -----------------------------------------------------------------------
  server-url: ${AGENT_SERVER_URL:http://localhost:8080}
  api-key: ${AGENT_API_KEY:}
  model: ${AGENT_MODEL:}
  decision: ${AGENT_DECISION_MODEL:}
  complex: ${AGENT_COMPLEX_MODEL:}
  simple: ${AGENT_SIMPLE_MODEL:}

  # -----------------------------------------------------------------------
  # GitHub issue reporting (for the "Report Bug" button on agent responses).
  # Both must be set for the button to create issues; otherwise the button
  # still appears but the action is a no-op (logged as a warning).
  # -----------------------------------------------------------------------
  github-token: ${GITHUB_TOKEN:}
  github-repo: ${GITHUB_REPO:jeremyunck/hugin}

logging:
  level:
    root: INFO
    com.example.discord: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
