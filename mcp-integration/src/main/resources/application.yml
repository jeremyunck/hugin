server:
  port: 8080

spring:
  application:
    name: mcp-integration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hugin}
    username: ${SPRING_DATASOURCE_USERNAME:hugin}
  sql:
    init:
      mode: always
  ai:
    mcp:
      client:
        # Disable Spring AI's property-driven auto-configuration.
        # All server lifecycle is managed by McpServerRegistryService.
        enabled: false
  data:
    # Redis backing the long-term memory store. Only contacted when memory.enabled=true
    # (the connection is established lazily on first use).
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mcp:
  # Path to the shared (git-tracked) MCP servers config file (Claude Desktop format).
  # Supports absolute paths and ~/... home-relative paths.
  config-file: ../mcp-servers.json
  # Path to the personal (gitignored) MCP servers config file.
  # Entries here override same-named entries in config-file.
  user-config-file: ../mcp-servers-user.json
  # Max wait for an MCP server's initialization handshake before the connection is
  # considered failed. Generous by default to tolerate slow first-run servers (e.g. uvx
  # downloading a package); lower it if you'd rather fail fast on unreachable servers.
  init-timeout: 120s


llm:
  # Active LLM provider — must match a key under llm.providers below.
  provider: openrouter
  # Default model used when a request does not specify one.
  # Must be a model that supports tool calling and be valid for the active provider
  # (e.g. llama3.2 / mistral-nemo for Ollama, openai/gpt-oss-120b for OpenRouter).
  model: openai/gpt-oss-120b
  # Reasoning effort sent to providers that support it. DeepSeek V4 maps medium to high.
  reasoning-effort: ${LLM_REASONING_EFFORT:medium}
  providers:
    # Local Ollama exposing the OpenAI-compatible API — no API key, so no auth header is sent.
    ollama:
      base-url: http://localhost:11434/v1
    # OpenRouter — authenticates with an Authorization: Bearer <api-key> header.
    # Set OPEN_ROUTER_API_KEY in the environment (sk-or-v1-...) and switch provider to "openrouter".
    openrouter:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPEN_ROUTER_API_KEY:}

conversation:
  memory:
    # Short-term, per-session conversation memory: the recent turns of a chat session are replayed
    # back into the model on each request so it remembers what was just said. Requests opt in by
    # sending a "sessionId"; requests without one stay stateless. Kept in-process by default (no
    # external dependency) and distinct from the long-term semantic memory below.
    enabled: ${CONVERSATION_MEMORY_ENABLED:true}
    # Sliding-window size: the most recent N stored messages kept per session.
    max-messages: 20
    # How long an idle session's history is retained before eviction.
    ttl: 2h

memory:
  # Redis-backed long-term memory with text-embedding recall. Disabled by default; when enabled it
  # requires a reachable Redis (spring.data.redis.*) and an embedding endpoint (embedding.* below).
  # When enabled, each finished exchange is embedded and stored, and the most-similar past memories
  # are injected into the prompt of future requests.
  enabled: ${MEMORY_ENABLED:false}
  # Redis key prefix under which memory records are stored (hash key is "<prefix>:records").
  key-prefix: agent:memory
  # Number of most-similar past memories recalled into the prompt.
  top-k: 3
  # Minimum cosine similarity (0..1) a memory must reach to be recalled; 0 disables the threshold.
  min-score: 0.75
  # Hard cap on stored memories; the oldest are evicted past this.
  max-entries: 1000

embedding:
  # OpenAI-schema embeddings endpoint (POST <base-url>/embeddings) used to vectorise memory text.
  # Defaults to OpenRouter; authenticates with Authorization: Bearer <api-key> when a key is set.
  base-url: ${EMBEDDING_BASE_URL:https://openrouter.ai/api/v1}
  api-key: ${OPEN_ROUTER_API_KEY:}
  # Model used specifically for embedding text (independent of the chat llm.model above).
  model: ${EMBEDDING_MODEL:openai/text-embedding-3-small}

agent:
  # API key for the /api/agent/** endpoints. Leave blank to disable authentication
  # (e.g. running behind a network-level security boundary).
  api-key:
  # Maximum wall-clock time allowed for a single agent request
  request-timeout: 5m
  # Maximum number of tool-call iterations in the agent loop before giving up.
  # A higher value gives the model more chances to use tools and refine its answer,
  # but also increases the maximum latency of a single request.
  max-iterations: 50
  # Base-of-operations directory for the agent server (install.sh sets this to ~/.hugin).
  # Used by SystemFactsService for disk-space reporting and by CloudAgentService for agent directories.
  home: ${AGENT_HOME:.}
  # Cloud-agent feature: each POST /api/agents clones a repository and runs the agent loop against it.
  cloud:
    # Enable the /api/agents endpoints and repo-cloning feature.
    enabled: ${CLOUD_AGENTS_ENABLED:false}
    # Cap on concurrent cloud-agent tasks.
    max-concurrent: 3
    # GitHub personal-access token used for git clone/push; keep blank to use only public repos.
    github-token: ${GITHUB_TOKEN:}
    # Prefix for the branch created in each cloned repository: <prefix>/<slug>-<short-id>.
    branch-prefix: agent
    # Delete the cloned working tree automatically when the agent loop finishes.
    cleanup-on-complete: false
  # Built-in local tools the agent can call directly (file read/write/edit, list, grep, shell).
  # These run in-process and let the model edit code and run commands. They grant the agent
  # filesystem and shell access, so disable them or scope workspace-root when that is a concern.
  tools:
    # Master switch for all built-in tools.
    enabled: true
    # Directory that file operations are confined to and the working dir for shell commands.
    # Relative paths and '~/' are NOT expanded here; use an absolute path to pin the workspace.
    workspace-root: .
    # Wall-clock limit for a single run_bash command.
    bash-timeout: 30s
    # Shell binary run_bash invokes. Blank auto-detects the user's login shell from $SHELL
    # (falling back to /bin/sh). Set explicitly to pin one, e.g. /bin/bash or /bin/zsh.
    shell: ""
    # Run commands through a login shell (-l) so the user's profile is sourced. Keep this true
    # so PATH entries set up in ~/.zprofile / ~/.bash_profile resolve — this is what makes
    # Homebrew tools like 'brew' (/opt/homebrew/bin, /usr/local/bin) runnable from run_bash.
    # Trade-off: the profile may define aliases/functions or run side-effecting startup code;
    # set to false to run a plain non-login shell if that is a concern.
    login-shell: true
    # Cap on the size (characters) of any single tool result returned to the model.
    max-output-chars: 30000
    # Glob patterns (relative to workspace-root) that read_file, write_file, and edit_file
    # will refuse to access. Patterns follow Java glob syntax; ** matches across directories.
    # Examples:  **/.env  secrets/**  **/*.key  .git/**
    deny-list: []

auth:
  jwt:
    # Optional base64-encoded HMAC key used to sign JWTs.
    # If blank, Hugin generates an ephemeral key on startup.
    secret-base64: ${AUTH_JWT_SECRET_BASE64:}
    issuer: hugin
    token-ttl: 12h
  # Self-scheduling: the schedule_prompt / list_scheduled_prompts / cancel_scheduled_prompt tools
  # let the agent set a prompt to run later (one-shot or recurring cron). When it fires, the prompt
  # runs through the full agent and the result is delivered back to the origin (the session it was
  # scheduled from) over the /api/agent/deliveries SSE stream — e.g. the Discord bot posts it to the
  # originating channel/DM.
  scheduler:
    # Master switch for the scheduling tools and the runner. When false the tools are not registered.
    enabled: ${SCHEDULER_ENABLED:true}
    # JSON file scheduled prompts are persisted to so they survive a restart ('~/' is expanded).
    store-file: ${SCHEDULER_STORE_FILE:~/.hugin/scheduled-prompts.json}
    # Cap on how many active schedules a single origin (session) may hold.
    max-per-target: 20
    # IANA timezone used when a schedule request omits one (e.g. America/Chicago for US Central).
    default-zone: ${SCHEDULER_DEFAULT_ZONE:}

google:
  # Google Workspace integration powering the google_docs_*, google_sheets_*,
  # google_calendar_* and google_gmail_* tools.
  #
  # Preferred setup for a personal install:
  #   1. In a Google Cloud project, enable the Google Docs, Sheets, Drive, Calendar and Gmail APIs.
  #   2. Create an OAuth client for a desktop app and download its JSON.
  #   3. Point oauth-client-secrets-file at that JSON (or set GOOGLE_OAUTH_CLIENT_SECRETS_FILE).
  #   4. On first use, Hugin opens the browser for consent and caches refresh tokens in oauth-token-dir.
  #
  # Legacy Workspace setup:
  #   1. Create a service account and download its JSON key.
  #   2. Point credentials-file at that JSON (or set GOOGLE_APPLICATION_CREDENTIALS).
  #   3. Share the docs/sheets/email data you want Hugin to access with the service account's email.
  # When no credentials are configured the google_* tools report themselves unavailable (no startup failure).
  oauth-client-secrets-file: ${GOOGLE_OAUTH_CLIENT_SECRETS_FILE:}
  oauth-token-dir: ${GOOGLE_OAUTH_TOKEN_DIR:~/.hugin/google-oauth}
  oauth-local-server-port: ${GOOGLE_OAUTH_LOCAL_SERVER_PORT:8765}
  credentials-file: ${GOOGLE_APPLICATION_CREDENTIALS:}
  # Application name reported to the Google APIs (cosmetic).
  application-name: Hugin
  # Optional: for Google Workspace domains with domain-wide delegation, the user email to impersonate.
  impersonate-user: ${GOOGLE_IMPERSONATE_USER:}
  # Optional: email that newly created docs/sheets are automatically shared with (as editor),
  # so a person can open files the service account creates. Per-call share_with overrides this.
  default-share-with: ${GOOGLE_DEFAULT_SHARE_WITH:}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: never

newrelic:
  enabled: ${NEW_RELIC_ENABLED:false}
  license-key: ${NEW_RELIC_TOKEN:}
  service-name: hugin

logging:
  level:
    com.example: DEBUG
